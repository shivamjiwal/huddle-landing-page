<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class ="huddle">
  <figure>
    <img src="logo.svg" alt="Logo of the Huddle landing page">
  </figure>
</div>
<div class="content">
  <div class="left-content">
    <figure>
      <img src="illustration-mockups.svg" alt="Illustration of the Huddle landing page">
    </figure>
  </div>
  <div class="right-content">
    <h1>Build The Community Your Fans Will Love</h1>
    <p>Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion.</p>
    <button class="register" type="button">Register</button>
  </div>
</div>
<footer >
  <a href="https://www.facebook.com"><img src="wired-outline-2624-logo-circle-facebook-hover-pinch (2).svg" alt="Facebook"></a>
  <a href="https://www.twitter.com"><img src="wired-outline-2628-logo-circle-twitter-hover-pinch.svg" alt="Twitter"></a>
  <a href="https://www.instagram.com"><img src="wired-outline-2626-logo-circle-instagram-hover-rotate (1).svg" alt="Instagram"></a>
</footer>
</body>
</html>
